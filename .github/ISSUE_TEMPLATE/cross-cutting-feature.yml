name: Cross-cutting Feature
description: Feature spanning multiple repos
labels: ["cross-cutting", "feature"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What does this feature do?
    validations:
      required: true
  - type: checkboxes
    id: repos
    attributes:
      label: Affected repos
      description: Which repos need changes?
      options:
        - label: api
        - label: app
        - label: agent
        - label: widget
        - label: infra
        - label: docs
        - label: website
        - label: monitor
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      value: |
        - [ ]
    validations:
      required: true
  - type: textarea
    id: sub_issues
    attributes:
      label: Sub-issues
      description: "Create sub-issues in affected repos and link them here. The Sub-issues progress field on the project board will track completion."
      value: |
        <!-- Add sub-issue links as they are created -->
