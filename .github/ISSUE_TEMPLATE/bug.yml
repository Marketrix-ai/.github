name: Bug Report
description: Report a bug (file in the affected repo, not here)
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Also apply the matching P0/P1/P2 label. P0 is exempt from stale auto-close.
      options:
        - P2 — Normal
        - P1 — High
        - P0 — Critical
      default: 0
    validations:
      required: true
