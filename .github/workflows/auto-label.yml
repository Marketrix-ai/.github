name: Auto Label

on:
  issues:
    types: [opened, edited]

jobs:
  label:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Apply cross-cutting label
        run: |
          # All issues in .github are cross-cutting by convention.
          # Single-repo issues belong in the individual repo.
          LABELS=$(gh api "/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}" --jq '[.labels[].name] | join(",")')

          if ! echo ",$LABELS," | grep -q ",cross-cutting,"; then
            gh issue edit "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --add-label cross-cutting
            echo "Applied cross-cutting label"
          fi
